confidence_summary:
  overall: medium_high
  overall_note: 'Evidence extraction and source anchoring are high-confidence: every assertion is a verbatim,
    sub-15-word span verified on its page. The medium component is concentrated in (a) the decomposition
    (lumper vs splitter) and (b) the forced-fit dimension assignments for a polygenic score, all of which
    are documented schema gaps rather than ambiguities in the paper. [Updated 2026-06-06 review: curator-approved
    edits applied - SR-1 key strip/relocation, SR-2 variant_ascertainment marked not-applicable, GE-1
    re-homing of A2 and addition of competing-risk and sex-interaction assertions, and the new GE-new-1
    (combination-superiority, MEDIUM credibility).]'
  decomposition_confidence: medium
  per_item:
  - item: GE-1
    confidence: high
    note: Central predictive/stratification claim; assertions are direct and unambiguous.
  - item: GE-2
    confidence: medium_high
    note: Coherent independence/complementarity claim, but a large bundle; one could further split pure
      discrimination (C-index) from joint metaGRS-plus-factors stratification.
  - item: GE-3
    confidence: medium_high
    note: Clear medicated-subpopulation stratification; the reverse-causation caveat (A6) bounds interpretation,
      which is reflected in the credibility_comment rather than the tier.
  - item: GE-new-1
    confidence: medium
    note: Combination-superiority thesis; empirical comparison fair (same UKB set) but no mechanistic
      account of why combining helps - hence MEDIUM (curator-set).
  forced_fits:
  - dimension: target_type
    value_used: VARIANT
    candidate_extension: CE-IN1
    flag: F-TT
  - dimension: resolution
    value_used: VARIANT
    candidate_extension:
    - CE-IN2
    - CE-IN3
    flag: F-RES
  - dimension: measurement_target
    value_used: not_activated
    candidate_extension: CE-IN4
    flag: F-MT
  - dimension: cohort_detail
    value_used: special_considerations_text
    candidate_extension: CE-IN5
  - dimension: target_nature
    value_used: DERIVED
    candidate_extension: CE-IN6
  - dimension: variant_ascertainment
    value_used: not_applicable_or_omitted
    candidate_extension: CE-IN1 (SHACL unsatisfiability)
    flag: F-VA
    note: 'SR-2 (curator review): VA does not cleanly apply to a score target; FROM_DATABASE withdrawn.'
  - dimension: method
    value_used: ASSOCIATION_STUDY (intermediate)
    candidate_extension: null
    flag: F-METH
    note: Intermediate-level value recorded per Protocol 3.4 rule 2; no leaf for polygenic-score association
      testing.
  decomposition_alternatives_considered:
  - alternative: Single merged item covering all metaGRS claims
    considered_because: 'Strict lumper (Protocol 2.1): GE-1/2/3 share target and largely share method
      and credibility.'
    rejected_because: No single label can honestly cover prediction, independence, and persistence-under-medication
      (Protocol 2.4). Kept as three. See flag F-DECOMP.
  - alternative: Split GE-1 into discrimination (HR/AUROC/PPV) vs life-course stratification (quintiles/cumulative
      incidence)
    considered_because: Two distinguishable faces of the predictive claim.
    rejected_because: Same target/method/credibility and a single coherent label ('metaGRS predicts and
      stratifies CAD risk'); kept as one item.
  - alternative: Separate cited-evidence items for component scores (GRS46K, FDR202, 1000Genomes) and
      comparators (Tikkanen, Tada)
    considered_because: These are distinct scores with their own provenance.
    rejected_because: They are data inputs / benchmarks measured by this paper in the same UKB set, not
      independently-cited evidence for the metaGRS claim. Captured as GE-1 special_considerations and
      assertion A2.
  - alternative: Separate the metaGRS-plus-conventional-factors joint-stratification assertions (GE-2.A12-A14)
      into their own item
    considered_because: They combine genomic and conventional risk.
    rejected_because: They are the additive/complementarity claim of GE-2 illustrated at the extremes;
      same target/method/credibility.
