  source: review_added
  knowledge_domain:
  - POPULATION_GENETICS
  method:
  - META_ANALYSIS
  - ASSOCIATION_STUDY
  primary_method: META_ANALYSIS
  target_type: VARIANT
  target: metaGRS relative to its three component scores (GRS46K, FDR202, genome-wide 1000Genomes) and
    prior published scores (Tikkanen, Tada)
  target_resolution: VARIANT
  variant_ascertainment: not_applicable_or_omitted
  phenotype_scale: CLINICAL
  credibility: MEDIUM
  credibility_comment: 'MEDIUM (curator-set, review session). The empirical comparison is solid: components
    and prior scores were re-computed in the same held-out UK Biobank set, so the head-to-head is fair.
    But the paper offers no mechanistic account of WHY combining component scores improves prediction;
    the gain could reflect overfitting (component scores weighted on a 3,000-person UKB training subset)
    or simply capturing more variants rather than a genuine methodological advantage. The paper itself
    flags overfitting risk to a single dataset/population and noise in GRS estimates (p10). Per Protocol
    7 this assesses how the paper substantiates the combination-superiority claim, not whether combining
    is ultimately superior.'
  flags:
  - F-TT
  - F-RES
  - F-METH
  - F-VA
  - F-MT
  special_considerations:
  - key: component_scores
    value: GRS46K (46,000 SNPs, Metabochip study), FDR202, and a genome-wide score; the latter two from
      the CARDIoGRAMplusC4D GWAS
  - key: benchmark_comparators
    value: metaGRS outperformed its component scores and prior published scores (Tikkanen, Tada) computed
      in the same UKB set (re-homed from GE-1)
  - key: overfitting_caveat
    value: three component scores combined/weighted on a 3,000-person UKB training subset; potential overfitting/contamination
      is the basis for the MEDIUM tier
  - key: target_nature
    value: DERIVED
  - key: target_composition
    value: AGGREGATE; also COMPOSITE (a composite of three component sub-scores)
  - key: observed_outcome_measures
    value: HAZARD_RATIO, POSITIVE_PREDICTIVE_VALUE
  - key: variant_ascertainment_note
    value: 'SR-2: not cleanly applicable to a score target; constituent variants from prior GWAS summary
      statistics and reference panels.'
  assertions:
  - id: GE-new-1.A1
    statement: The metaGRS is a meta-score built by combining three component genetic risk scores
    source_span:
      page: 4
      phrase: based on 3 genetic risk scores
  - id: GE-new-1.A2
    statement: The metaGRS showed substantially greater per-SD CAD association than its component scores
      and prior published scores
    source_span:
      page: 5
      phrase: substantially greater association with CAD risk in terms of hazard ratio
  - id: GE-new-1.A3
    statement: This per-SD association exceeds that of any previously published, externally tested genetic
      risk score (re-homed from GE-1.A2)
    source_span:
      page: 1
      phrase: an association larger than any other externally tested genetic risk score previously published
  - id: GE-new-1.A4
    statement: In the discussion, the metaGRS achieved greater risk discrimination than previously published
      GRS based on selected SNPs
    source_span:
      page: 8
      phrase: greater risk discrimination than previously published genomic risk scores
