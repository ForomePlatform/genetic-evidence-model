candidate_extensions:
- id: CE-IN1
  dimension: target_type_score
  description: 'The evidential target is a polygenic risk score (metaGRS), which is neither a gene, variant,
    segment, interval, nor transcript. The current Target type enumeration has no value for a score. Candidate
    value: SCORE, with subtypes POLYGENIC_SCORE / COMPOSITE_SCORE. Forced here to VARIANT (nearest existing
    value) with a flag.

    SHACL note (updated): under target_type=VARIANT the score has no genuine ascertainment mode, so
    variant_ascertainment is marked not_applicable_or_omitted. The schema accepts this explicit escape
    (NOT_APPLICABLE_OR_OMITTED is a recognized sentinel that satisfies presence and class for any
    dimension), so the item validates while recording that the dimension was addressed, not populated.
    A first-class target_type=SCORE would remove the forced fit rather than rely on the escape; this is
    the sharpest justification for CE-IN1.'
  location_in_this_annotation: GE-1, GE-2, GE-3, GE-new-1 (target_type)
  status: single_paper_gap
- id: CE-IN2
  dimension: resolution_whole_genome_aggregate
  description: 'The existing Resolution enumeration (WINDOW | GENE | FUNCTIONAL_ELEMENT | POSITION | VARIANT)
    presupposes a contiguous or pointwise target. The metaGRS aggregates 1,745,180 variants genome-wide
    and is neither. Candidate value: WHOLE_GENOME_AGGREGATE. Forced here to VARIANT with a flag.

    '
  location_in_this_annotation: GE-1, GE-2, GE-3, GE-new-1 (resolution)
  status: single_paper_gap
- id: CE-IN3
  dimension: target_composition
  description: 'A new orthogonal dimension recording whether the target is a SINGLE element, an AGGREGATE
    of many elements, or a COMPOSITE of sub-scores. Complementary framing to CE-IN2. The metaGRS is AGGREGATE
    (and itself COMPOSITE of three component scores).

    '
  location_in_this_annotation: GE-1, GE-2, GE-3, GE-new-1 (target_composition = AGGREGATE)
  status: single_paper_gap
- id: CE-IN4
  dimension: measurement_target_epidemiological
  description: 'measurement_target currently activates only for GENE_FUNCTION and is molecular (BINDING,
    ACTIVITY, LOCALIZATION, EXISTENCE). A population-genetics PGS paper reports epidemiological outcome
    measures that have no home. Candidate values, activated when knowledge_domain contains POPULATION_GENETICS:
    HAZARD_RATIO, ODDS_RATIO, C_INDEX, AUROC, CUMULATIVE_INCIDENCE, POSITIVE_PREDICTIVE_VALUE, PRECISION_RECALL_AREA.

    '
  location_in_this_annotation: GE-1, GE-2, GE-3, GE-new-1 (observed_outcome_measures special_consideration)
  status: single_paper_gap
- id: CE-IN5
  dimension: cohort_structured_subblock
  description: 'Cohort detail (n_total, n_cases, n_controls, mean_followup, ancestry_pct, age_range, ascertainment_source)
    currently lives as unstructured credibility/special_consideration text. Candidate: a structured `cohort`
    sub-block so these are queryable.

    '
  location_in_this_annotation: GE-1 (cohort special_considerations)
  status: single_paper_gap
- id: CE-IN6
  dimension: target_nature_derived_artifact
  description: 'The metaGRS is a human-engineered construction, not a naturally occurring genomic entity.
    Candidate: a `target_nature` (NATURAL | DERIVED) field, or boolean `derived_artifact`, to mark computationally
    derived targets. Recorded here as target_nature = DERIVED.

    '
  location_in_this_annotation: GE-1, GE-2, GE-3, GE-new-1 (target_nature)
  status: single_paper_gap
flags:
- id: F-TT
  type: ai_assumption
  dimension: target_type
  applies_to:
  - GE-1
  - GE-2
  - GE-3
  - GE-new-1
  note: 'target_type is required and single-valued, but no enumeration value describes a polygenic score;
    the nearest existing value VARIANT was assigned and the gap flagged via CE-IN1 (precise value SCORE
    / POLYGENIC_SCORE). The earlier rationale that VARIANT was chosen to keep variant_ascertainment active
    is withdrawn under SR-2: VA is now marked not-applicable, and the fact that no target_type value satisfies
    the schema cleanly (see CE-IN1 SHACL note) is itself the evidence for the SCORE extension.'
- id: F-RES
  type: ai_assumption
  dimension: resolution
  applies_to:
  - GE-1
  - GE-2
  - GE-3
  - GE-new-1
  note: 'resolution forced to VARIANT (nearest existing value). A polygenic score does not localize signal
    to a window, position, or single variant; it aggregates genome-wide. The precise value would be WHOLE_GENOME_AGGREGATE
    (CE-IN2) with target_composition = AGGREGATE (CE-IN3).

    '
- id: F-METH
  type: ai_uncertainty
  dimension: method
  applies_to:
  - GE-1
  - GE-2
  - GE-3
  - GE-new-1
  note: 'ASSOCIATION_STUDY is recorded at the intermediate level (Protocol 3.4, rule 2): the score''s
    association with CAD is tested by Cox / logistic regression, which matches none of the leaves (GWAS,
    CANDIDATE_GENE_STUDY, FINE_MAPPING) — there is no leaf for polygenic-score association testing. META_ANALYSIS
    is a committed sibling value capturing the score''s construction from multiple GWASes (per dimensions.md,
    META_ANALYSIS includes PGS construction). The two are siblings under STATISTICAL_GENETICS, so listing
    both is permitted.

    '
- id: F-VA
  type: ai_uncertainty
  dimension: variant_ascertainment
  applies_to:
  - GE-1
  - GE-2
  - GE-3
  - GE-new-1
  note: 'SR-2 (curator review): variant_ascertainment does not cleanly apply to a score target. The earlier
    FROM_DATABASE assignment is withdrawn and the dimension is marked not_applicable_or_omitted on every
    item. The constituent metaGRS variants entered from prior GWAS summary statistics (CARDIoGRAMplusC4D;
    Metabochip) and reference panels (1000G/HRC/UK10K), recorded in special_considerations. No value is
    committed, hence ai_uncertainty (Protocol 6.2). The SHACL unsatisfiability this creates under target_type=VARIANT
    is recorded as support for CE-IN1.'
- id: F-CRED
  type: ai_assumption
  dimension: credibility
  applies_to:
  - GE-1
  - GE-2
  - GE-3
  note: 'credibility is subjective by design. The HIGH tier reflects the annotator''s holistic reading
    of the described design — a very large (n=482,629), prospective, external validation with 22,242 CAD
    cases — tempered by stated limitations (>95% European ancestry; volunteer cohort healthier than the
    general population; component-score weighting trained in a 3,000-person subset of the same biobank).
    Per Protocol 7, this reflects how the paper substantiates its claims, not a judgment of whether the
    claims are ultimately correct. Curator should confirm the tier.

    '
- id: F-MT
  type: ai_uncertainty
  dimension: measurement_target
  applies_to:
  - GE-1
  - GE-2
  - GE-3
  - GE-new-1
  note: 'measurement_target is left unpopulated because its activation condition (knowledge_domain contains
    GENE_FUNCTION) is not met. This is a schema gap, not annotator doubt: the paper''s outcome measures
    (hazard ratio, C-index, AUROC, positive predictive value, precision-recall area, cumulative incidence)
    are recorded under the observed_outcome_measures special_consideration and flagged via CE-IN4, which
    proposes activating an epidemiological measurement_target for POPULATION_GENETICS.

    '
- id: F-DECOMP
  type: ai_assumption
  dimension: decomposition
  applies_to:
  - GE-1
  - GE-2
  - GE-3
  note: 'The three items share target (metaGRS) and largely share method and credibility, so a strict
    lumper reading (Protocol 2.1) would permit a single merged item. They were split on label-coherence
    (Protocol 2.4): "metaGRS predicts and stratifies CAD risk", "metaGRS adds information independent
    of conventional risk factors", and "metaGRS still stratifies risk among the medicated" are three distinct
    headline claims no single label covers. GE-3 additionally targets a distinct medicated subpopulation.
    GE-2 and GE-3 operate on the metaGRS constructed (by META_ANALYSIS) in GE-1; their method is therefore
    recorded as ASSOCIATION_STUDY only. See decomposition_alternatives_considered.

    '
evidence:
- id: GE-1
  label: metaGRS confers HR 1.71 per SD for CAD and stratifies a 4.17-fold risk gradient across quintiles
    in UK Biobank
  source: ai_autonomous
  knowledge_domain:
  - POPULATION_GENETICS
  method:
  - META_ANALYSIS
  - ASSOCIATION_STUDY
  target_type: VARIANT
  target: metaGRS — a genome-wide polygenic risk score for CAD comprising 1,745,180 variants
  variant_ascertainment: not_applicable_or_omitted
  phenotype_scale: CLINICAL
  credibility: HIGH
  credibility_comment: 'External validation of a pre-specified score in 482,629 UK Biobank participants
    (the 3,000 used for weighting were held out), with 22,242 CAD cases; metaGRS shows the largest per-SD
    association of any externally tested published score and clean monotonic quintile stratification.
    Tempered by single-ancestry composition (>95% European) and a volunteer cohort healthier than the
    general population. See flag F-CRED.

    '
  special_considerations:
  - key: cohort_total
    value: 482,629 UK Biobank external-validation participants (further 3,000 held out as a weighting/training
      set)
  - key: cohort_cases
    value: 22,242 CAD cases (9,729 prevalent + 12,513 incident)
  - key: cohort_controls
    value: 460,387 noncases
  - key: mean_followup
    value: 6.2 years for incident analyses; censoring age 75
  - key: ancestry_composition
    value: '>95% European; non-European <5% of UK Biobank'
  - key: age_range
    value: UK Biobank recruitment ages ~40-69 years
  - key: source_GWAS
    value: metaGRS combines GRS46K (46,000 SNPs, Metabochip study), FDR202, and a genome-wide score, both
      from CARDIoGRAMplusC4D GWAS
  - key: score_weighting
    value: three component scores combined/weighted using a 3,000-person UK Biobank training set
  - key: heritability_captured
    value: score variants explain 26.8% of CAD heritability
  - key: candidate_extension_for_cohort_structure
    value: CE-IN5 (these cohort facts would populate a structured cohort sub-block)
  - key: target_nature
    value: DERIVED
  - key: target_composition
    value: AGGREGATE
  - key: observed_outcome_measures
    value: HAZARD_RATIO, AUROC, POSITIVE_PREDICTIVE_VALUE, PRECISION_RECALL_AREA, CUMULATIVE_INCIDENCE
  - key: variant_ascertainment_note
    value: 'SR-2 (curator review): variant_ascertainment does not cleanly apply to a score target; the
      constituent metaGRS variants entered from prior GWAS summary statistics (CARDIoGRAMplusC4D; Metabochip)
      and imputation reference panels (1000G/HRC/UK10K). The resulting SHACL unsatisfiability under target_type=VARIANT
      is recorded as support for CE-IN1.'
