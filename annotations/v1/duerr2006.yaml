# =====================================================================
#  Duerr RH, Taylor KD, Brant SR, Rioux JD, et al. (2006)
#  "A Genome-Wide Association Study Identifies IL23R as an
#  Inflammatory Bowel Disease Gene"
#  Science 314(5804):1461-1463
#
#  Annotation source: autonomous (AI). Single-pass annotation under
#  PROTOCOL_AUTONOMOUS.md. No curator in the loop.
#
#  Decomposition (lumper default; split only on method / target /
#  credibility):
#    GE-1  IL23R rs11209026 protection, non-Jewish ileal CD GWAS discovery
#    GE-2  IL23R replication, independent Jewish ileal CD + combined meta
#    GE-3  IL23R association with IBD by family-based transmission testing
#    GE-4  Multiple independent IL23R signals (conditional / fine-mapping)
#    GE-5  CARD15 confirmed in the same GWAS discovery scan
#    GE-6  No association at other IL-23 pathway genes / within IL12RB2
#    GE-7  Arg-381 residue conserved across species (comparative genomics)
#    GE-8  Cited prior in-vivo evidence for IL-23-driven inflammation
#
#  Negative findings (GE-6, the IL23R extracellular SNP contrast in GE-1)
#  are expressed by predicate polarity within assertions; no schema
#  extension is needed for negation (consistent with the schema's
#  predicate-based EvidenceAssertion design).
# =====================================================================

publication:
  id: "PMID:17068223"
  doi: "10.1126/science.1135245"
  citation: "Duerr RH, Taylor KD, Brant SR, et al. Science 2006;314(5804):1461-1463"
  title: >
    A Genome-Wide Association Study Identifies IL23R as an
    Inflammatory Bowel Disease Gene
  flags: [F1]   # PMID recalled, not present in the source PDF

provenance:
  mode: autonomous
  protocol_version: "1.0"
  annotator: "claude-opus-4-8"
  annotated_at: "2026-06-04T00:00:00Z"
  exemplars_used: [gupta2015, nelson1992, davis2011]
  notes: >
    Per the protocol, no prior AI-drafted annotation of this paper was
    used as a template; only the four curator-led exemplars ground the
    corpus conventions. Schema read from the skill bundle
    (schema/dimensions.md and genetic_evidence.shacl.ttl).

# =====================================================================
#  Candidate extensions surfaced by this paper
# =====================================================================
# Only one genuine schema gap is surfaced. The protective allele (OR<1)
# is the paper's headline; the schema encodes effect direction only
# implicitly via the sign of the odds ratio.
candidate_extensions:
  - id: CE-DU1
    dimension: direction_of_effect
    description: >
      The headline finding is a PROTECTIVE allele (Gln-381 at
      rs11209026: OR 0.26 in non-Jewish cases, OR 0.45 in Jewish cases),
      and the paper frames the continuum of risk/neutral/protective
      effects explicitly. The schema carries direction only implicitly
      via the OR sign. Downstream consumers (e.g. ACMG/AMP, which
      separates benign-supporting from pathogenic codes) may want
      direction as an explicit value.
    affected_dimensions: [credibility, target]
    proposed_values: "direction: RISK_CONFERRING | PROTECTIVE | NEUTRAL | UNKNOWN (or keep implicit via OR sign and document the convention)"
    location_in_this_annotation: "GE-1, GE-2"
    status: awaiting_second_paper

# =====================================================================
#  GeneticEvidence items
# =====================================================================

evidence:

  # --------------------------------------------------------------------
  - id: GE-1
    label: "rs11209026 (Arg381Gln) in IL23R confers protection against ileal CD in the non-Jewish GWAS discovery cohort"
    source: ai_annotation
    knowledge_domain: [POPULATION_GENETICS, HUMAN_GENETICS]
    method: [GWAS]
    target_type: VARIANT
    target: >
      rs11209026 (IL23R c.1142G>A, p.Arg381Gln), plus nine additional
      associated IL23R-region markers (P < 0.0001 in the non-Jewish cohort)
    resolution: VARIANT
    variant_ascertainment: [FROM_DATABASE, OBSERVED_IN_CASES, OBSERVED_IN_CONTROLS]
    phenotype_scale: CLINICAL
    environmental_factors:
      annotated_as: not_applicable_or_omitted
      annotator_note: >
        The intro attributes IBD broadly to a commensal-bacteria-triggered
        mucosal immune response, but no variant x environment interaction
        is tested.
    penetrance:
      value: unknown
      annotator_comment: "Complex-trait association; penetrance not assessed."
    genetic_background_considered: true
    genetic_background_note: >
      Ancestry was handled by analysing non-Jewish and Jewish cohorts
      separately with ancestry-matched controls.
    credibility: HIGH
    credibility_comment: >
      Genome-wide scan of 308,332 SNPs; rs11209026 is one of only three
      markers surviving Bonferroni correction. Single-marker chi-square /
      Cochran-Mantel-Haenszel testing. Discovery cohort only (replication
      is GE-2). Protective direction (OR ~0.26) — see CE-DU1.
    special_considerations:
      - key: "cohort"
        value: >
          567 non-Jewish European-ancestry ileal CD cases and 571
          non-Jewish controls genotyped; 547 cases / 548 controls retained
          after >=94% genotype-completion filtering.
      - key: "platform"
        value: "Illumina HumanHap300 BeadChip; 308,332 autosomal SNPs."
    flags: [F2, F4]
    assertions:
      - id: GE-1.A1
        statement: >
          A genome-wide association scan finds a highly significant
          association between Crohn's disease and IL23R on 1p31
        source_span:
          page: 1
          key_phrase: "highly significant association between Crohn's disease and the IL23R gene"
      - id: GE-1.A2
        statement: >
          IL23R encodes a subunit of the receptor for the proinflammatory
          cytokine IL-23, an intriguing functional candidate
        source_span:
          page: 1
          key_phrase: "encodes a subunit of the receptor for the proinflammatory cytokine"
      - id: GE-1.A3
        statement: >
          The glutamine allele of Arg381Gln protects against development
          of CD (uncommon protective coding variant)
        source_span:
          page: 2
          key_phrase: "glutamine allele appears to protect against development of CD"
      - id: GE-1.A4
        statement: >
          The Gln-381 allele frequency is 1.9% in non-Jewish ileal CD
          cases versus 7.0% in non-Jewish controls
        source_span:
          page: 2
          key_phrase: "allelic frequency of 1.9% in the non-Jewish patients with ileal CD"
      - id: GE-1.A5
        statement: >
          Nine further IL23R / intergenic markers are also associated in
          the non-Jewish discovery cohort
        source_span:
          page: 1
          key_phrase: "nine other markers in IL23R and in the intergenic region"
      - id: GE-1.A6
        statement: >
          By contrast, two extracellular-domain nonsynonymous IL23R SNPs
          (His3Gln, Pro310Leu) show no association — specificity to the
          cytoplasmic Arg-381
        source_span:
          page: 2
          key_phrase: "show no evidence for disease association"

  # --------------------------------------------------------------------
  - id: GE-2
    label: "IL23R variant associations replicate in an independent Jewish ileal CD case-control cohort and combined meta-analysis"
    source: ai_annotation
    knowledge_domain: [POPULATION_GENETICS, HUMAN_GENETICS]
    method: [CANDIDATE_GENE_STUDY, META_ANALYSIS]
    target_type: VARIANT
    target: >
      IL23R-region markers (incl. rs11209026, rs7517847, rs11465804)
      tested for replication; combined across both case-control cohorts
    resolution: VARIANT
    variant_ascertainment: [FROM_DATABASE, OBSERVED_IN_CASES, OBSERVED_IN_CONTROLS]
    phenotype_scale: CLINICAL
    environmental_factors:
      annotated_as: not_applicable_or_omitted
      annotator_note: "Not assessed."
    penetrance:
      value: unknown
      annotator_comment: "Complex-trait association; penetrance not assessed."
    genetic_background_considered: true
    genetic_background_note: "Separate Jewish-ancestry cohort with matched controls."
    credibility: HIGH
    credibility_comment: >
      Independent replication cohort (different ancestry stratum), so
      credibility differs from the GE-1 discovery despite the same target.
      Targeted testing of IL23R markers (not genome-wide) plus a combined
      Cochran-Mantel-Haenszel meta-analysis across both case-control
