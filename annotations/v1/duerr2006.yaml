    knowledge_domain: [HUMAN_GENETICS]
    method: [TRANSMISSION_DISEQUILIBRIUM_TEST]
    target_type: VARIANT
    target: "IL23R-region markers (incl. rs11209026) tested for transmission distortion to affected offspring"
