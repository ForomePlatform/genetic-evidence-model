        source_span:
          page: 2
          key_phrase: "OR = 0.45, 95% CI (0.27 to 0.73)"

  # --------------------------------------------------------------------
  - id: GE-3
    label: "IL23R variants associate with IBD by family-based transmission testing in 883 nuclear families (no association in Jewish UC)"
