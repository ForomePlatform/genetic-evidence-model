    special_considerations:
      - key: "cohort"
        value: "401 Jewish-ancestry ileal CD cases and 433 Jewish controls."
    flags: [F2, F4, F9]
    assertions:
      - id: GE-2.A1
        statement: >
          An independent Jewish ileal CD case-control cohort of 401
