# =====================================================================
#  Annotator-emitted flags
# =====================================================================
flags:
  - id: F1
    type: ai_assumption
    target: "publication.id"
    note: >
      PMID:17068223 is recalled from background knowledge; it is NOT
      present in the source PDF. The DOI (10.1126/science.1135245) and
      citation ARE in the source (page 4). A reviewer should verify the
      PMID.
  - id: F2
    type: ai_normalization
    target: "GE-1, GE-2, GE-4, GE-5 variant_ascertainment"
    note: >
      GWAS / case-control SNPs are array tag SNPs selected from a
      HapMap-derived panel (FROM_DATABASE) and then genotyped in cases and
      controls (OBSERVED_IN_CASES, OBSERVED_IN_CONTROLS). The paper does
      not use ascertainment language; mapping is mechanical.
  - id: F3
    type: ai_assumption
    target: "GE-6 mode_of_inheritance"
    note: >
      target_type GENE + HUMAN_GENETICS activates the mode_of_inheritance
      conditional, but the claim is a complex-trait NULL association with
      no Mendelian inheritance model. Marked not_applicable_or_omitted.
      Consistent with the Davis 2011 GE-1 curator precedent of leaving MOI
      unpopulated for population/case-control gene-level associations.
  - id: F4
    type: ai_assumption
    target: "GE-1, GE-2, GE-3, GE-4, GE-5 genetic_background_considered"
    note: >
      Set true on the basis that the study controlled genetic background
      by analysing Jewish and non-Jewish strata separately with matched
      controls. The paper does not use the phrase "genetic background";
      this is an interpretive mapping.
  - id: F5
    type: ai_uncertainty
    target: "GE-4 decomposition / GE-3 sub-cohort lumping"
    note: >
      GE-4 (multiple independent signals, fine-mapping) could be lumped
      into GE-2's combined case-control analysis; kept separate because
      method (FINE_MAPPING) and the claim differ. Relatedly, GE-3 lumps
      CD/UC and Jewish/non-Jewish family sub-cohorts into one item; a
      reviewer may prefer to split UC from CD. Flagged for review.
  - id: F6
    type: ai_assumption
    target: "GE-7 knowledge_domain / target_type / variant_ascertainment"
    note: >
      Conservation of a residue is mapped to knowledge_domain
      COMPARATIVE_GENOMICS, method BIOINFORMATICS_INFERENCE, target_type
      VARIANT with resolution POSITION (the Arg-381 site), and
      variant_ascertainment FROM_DATABASE (multi-species reference
      sequences). The "variant" here is a residue position, not a sequence
      variant observed in subjects.
  - id: F7
    type: ai_assumption
    target: "GE-8 cited-evidence scope"
    note: >
      Multiple cited mouse-model and functional-immunology references are
      lumped into one cited_evidence item; knockout_type UNCONDITIONAL
      covers both IL-23-deficiency and p19-transgenic designs. The cited
      anti-p40 clinical trial is recorded as context, not a GE item,
      because therapeutic-efficacy evidence has no fitting
      knowledge_domain value.
  - id: F8
    type: ai_normalization
    target: "phenotype_scale"
    note: >
      Human CD/UC/IBD phenotypes mapped to CLINICAL; murine
      colitis/systemic inflammation (GE-8) mapped to ORGANISMAL; residue
      conservation (GE-7) to MOLECULAR.
  - id: F9
    type: ai_assumption
    target: "GE-2 method"
    note: >
      The Jewish-cohort replication is targeted testing of IL23R markers
      (CANDIDATE_GENE_STUDY), and the combined Cochran-Mantel-Haenszel
      analysis across both case-control cohorts is META_ANALYSIS. Both
      assigned as additive method values.

