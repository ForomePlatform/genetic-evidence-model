# =====================================================================
#  Jossin et al. 2017 — "Llgl1 Connects Cell Polarity with Cell-Cell
#  Adhesion in Embryonic Neural Stem Cells" (Developmental Cell)
#
#  Annotation source: manual (human curator). 60 PDF annotations
#  (51 highlights + 9 callouts) plus a summary-table row from the
#  corpus annotator.
#
#  Ground truth; AI transformations of highlights -> schema are
#  declared as `source: manual_annotation`. Reviewer disagreements,
#  queries, and suggestions are surfaced inline rather than silently
#  applied.
#
#  Extension promotion rule: a candidate extension is promoted to the
#  schema when a second independent paper exercises the same gap. On
#  first occurrence, gaps are recorded in `candidate_extensions` below.
# =====================================================================

publication:
  id: "PMID:28552559"
  doi: "10.1016/j.devcel.2017.05.002"
  citation: "Jossin Y, Lee M, Klezovitch O, et al. Dev Cell 2017;41:481-495"
  title: "Llgl1 Connects Cell Polarity with Cell-Cell Adhesion in Embryonic Neural Stem Cells"

provenance:
  curation_context:
    program: "Brigham Genetic Medicine (BGM), Undiagnosed Diseases Network (UDN)"
    scope: >
      Curation performed in the context of a clinical-genomics program
      focused on identifying causal and candidate genes in patients with
      undiagnosed diseases of suspected genetic etiology. Evidence is
      weighted for its relevance to diagnostic variant interpretation.
  annotator: "alico"
  curator_editorial_notes:
    - page: 6
      note: >
        "Couple of pages where explained how, absence of Llgl1 cause
        reorganisation of the brain. I am not sure how this part may be
        relevant to BGM people."
      interpretation: >
        Annotator's in-scope/out-of-scope judgment for the BGM/UDN program;
        not a schema value. Retained as evidence-relevance provenance.

# =====================================================================
#  Candidate extensions — single-paper gaps awaiting independent
#  confirmation. If a later paper in the corpus exercises the same
#  gap, it is promoted to the schema.
# =====================================================================
candidate_extensions:
  - id: CE-J1
    dimension: resolution_protein_subdomain
    description: >
      The paper maps the LLGL1-N-cadherin interaction to the WD14
      (primarily) and WD10 domains of LLGL1, and to the beta-catenin-
      binding region of N-cadherin. This is finer than the current
      Resolution enumeration (WINDOW | GENE | FUNCTIONAL_ELEMENT |
      POSITION | VARIANT). Candidate value: PROTEIN_SUBDOMAIN.
    location_in_this_annotation: "GE-4 and GE-5"
  - id: CE-J2
    dimension: target_type_interaction_or_complex
    description: >
      The in vivo dominant-negative rescue experiment targets the
      LLGL1-N-cadherin *interaction*, not a gene. The paper also
      documents a tripartite LLGL1-N-cadherin-beta-catenin complex.
      Candidate target_type values: INTERACTION and COMPLEX.
    location_in_this_annotation: "GE-6"
  - id: CE-J3
    dimension: gene_relation_binding_and_trafficking
    description: >
      The Gene relation enumeration currently has
      X_has_same_function_as_Y, X_regulates_Y, X_inhibits_Y. It does
      not cover physical binding or trafficking regulation, both of
      which are central claims of this paper. Candidate values:
      X_physically_binds_Y and X_regulates_trafficking_of_Y.
    location_in_this_annotation: "GE-4 (binding), GE-5 (trafficking)"

# =====================================================================
#  GeneticEvidence items
#
#  Decomposition per natural-claim granularity. Item overview:
#    GE-1: Organismal phenotype of Llgl1 cKO (gross anatomy, behavior)
#    GE-2: Histological phenotype (ectopic gray matter composition)
#    GE-3: Cellular phenotype (ENSC layer disruption, AJC loss)
#    GE-4: Molecular mechanism — LLGL1-N-cadherin direct binding
#    GE-5: Regulatory mechanism — aPKC phosphorylation of LLGL1
#    GE-6: In vivo dominant-negative rescue (3xLLGL1#9 and 5SA)
# =====================================================================

evidence:

  # --------------------------------------------------------------------
  - id: GE-1
    label: "Organismal phenotype of Llgl1 conditional knockout"
    source: manual_annotation
    knowledge_domain: [MODEL_ORGANISM]
    method: [IN_VIVO_EXPERIMENT]
    target_type: GENE
    target: "Llgl1 (mouse)"
    resolution: GENE
    organism: "Mammal (mouse)"
    knockout_type: CONDITIONAL
    phenotype_scale: ORGANISMAL
    credibility: VERY_HIGH
    credibility_comment: >
      Per annotator summary: "Very accurate, detailed paper."
    special_considerations:
      - key: "cell_type"
        value: "embryonic neural stem cells (ENSCs)"
      - key: "developmental_timing_of_Llgl1_loss"
        value: "detectable by embryonic day 12.5 (E12.5)"
      - key: "cre_driver"
        value: "Nestin-Cre, expressed in CNS ENSCs from E10.5"
    hpo_terms:
      annotated_as: not_applicable_or_omitted
      reviewer_suggestion:
        candidate_terms:
          - "HP:0032388 (Periventricular heterotopia)"
          - "HP:0001250 (Seizure)"
        rationale: >
          The paper explicitly describes PH and sporadic seizures.
          Flagged for curator review but not added to the ground truth.
    assertions:
      - id: GE-1.A1
        statement: "Llgl1 cKO mice develop completely penetrant periventricular heterotopia"
        source_span:
          page: 3
          key_phrase: "completely penetrant disorganization of cerebral cortices"
        callout: null
      - id: GE-1.A2
        statement: "Llgl1 cKO adult mice exhibit sporadic seizures"
        source_span:
          page: 3
          key_phrase: "sporadic seizures associated with falls and convulsions"
        callout: null
      - id: GE-1.A3
        statement: "MCC phenotype resembles severe human periventricular heterotopia"
        source_span:
          page: 3
          key_phrase: "strikingly similar to MCC in human patients suffering from severe PH"
        callout: {page: 3, text: "phenotype"}
      - id: GE-1.A4
        statement: "Growth delayed but brains approximately normal size at birth"
        source_span:
          page: 3
          key_phrase: "growth of mutant pups was delayed, their brains were approximately normal size"
        callout: null

  # --------------------------------------------------------------------
  - id: GE-2
    label: "Histological phenotype — composition of ectopic gray matter"
    source: manual_annotation
    knowledge_domain: [MODEL_ORGANISM]
    method: [IN_VIVO_EXPERIMENT]
    target_type: GENE
    target: "Llgl1 (mouse)"
    resolution: GENE
    organism: "Mammal (mouse)"
    phenotype_scale: HISTOLOGICAL
    measurement_target: [LOCALIZATION, EXISTENCE]
    reviewer_query:
      issue: >
        The annotator's summary gave Measurement target = "Binding activity"
        for the paper as a whole, but this item (immunostaining for
        NeuroN/GFAP cell-type markers) measures cellular composition,
        not binding. Using LOCALIZATION + EXISTENCE from the
        Measurement target enumeration as an AI-inferred value. Please
        confirm or override.
    credibility: VERY_HIGH
    assertions:
      - id: GE-2.A1
        statement: >
          Ectopic gray matter is composed predominantly of differentiated
          neurons, not astrocytes
        source_span:
          page: 3
          key_phrase: "predominantly NeuroN+ cells and few GFAP+ astrocytes"
        callout: {page: 3, text: "phenotype on histological level"}
      - id: GE-2.A2
        statement: "Ectopic neurons are predominantly late-born (E16.5) rather than early-born (E13.5)"
        source_span:
          page: 3
          key_phrase: "late stages of neurogenesis and express appropriate stage-specific markers"
        callout: null

  # --------------------------------------------------------------------
  - id: GE-3
    label: "Cellular phenotype — ENSC layer disruption and AJC loss"
    source: manual_annotation
    knowledge_domain: [MODEL_ORGANISM, GENE_FUNCTION]
    method: [IN_VIVO_EXPERIMENT, IN_VITRO_EXPERIMENT]
    primary_method: IN_VIVO_EXPERIMENT
    target_type: GENE
    target: "Llgl1 (mouse)"
    resolution: GENE
    organism: "Mammal (mouse)"
    phenotype_scale: CELLULAR
    measurement_target: [LOCALIZATION, EXISTENCE]
    credibility: VERY_HIGH
    special_considerations:
      - key: "techniques"
        value: >
          Immunohistochemistry, electron microscopy, live-slice imaging
          via in utero electroporation of NLS-GFP, Cell Tracker Green
          labeling
    assertions:
      - id: GE-3.A1
        statement: "ENSC layer becomes discontinuous by E14.5 in Llgl1 cKO"
        source_span:
          page: 4
          key_phrase: "by E14.5 the ENSC layer was discontinuous"
        callout: null
      - id: GE-3.A2
        statement: "Neurogenic surface area significantly increased in mutant"
        source_span:
          page: 4
          key_phrase: "significant increase in area of the neurogenic surface"
        callout: null
      - id: GE-3.A3
        statement: "AJCs focally disrupted at E14.5, before ENSC mislocalization"
        source_span:
          page: 6
          key_phrase: "focal disruption of AJCs in Llgl1 cKO ENSCs at E14.5"
        callout: null
      - id: GE-3.A4
        statement: "Complete AJC loss in short cortical fragments; cells protrude into ventricle"
        source_span:
          page: 6
          key_phrase: "complete loss of AJCs... Cells in these areas protruded into the ventricular space"
        callout: null
      - id: GE-3.A5
        statement: "N-cadherin-containing AJCs disorganized even where ventricular wall is intact"
        source_span:
          page: 8
          key_phrase: "disorganization of N-cadherin-containing AJCs in E14.5 Llgl1 cKO cortices"
        callout: null

  # --------------------------------------------------------------------
  - id: GE-4
    label: "Molecular mechanism — LLGL1 directly binds N-cadherin"
    source: manual_annotation
    knowledge_domain: [GENE_FUNCTION]
    method: [IN_VITRO_EXPERIMENT, IN_VIVO_EXPERIMENT]
    primary_method: IN_VIVO_EXPERIMENT
    method_detail: >
      In vitro: GST pull-down from bacterially purified proteins,
      co-immunoprecipitation in HEK293. In vivo: endogenous co-IP from
      E14.5 mouse brain extracts.
    target_type: GENE
    target: "LLGL1 / N-cadherin"
    resolution: GENE
    candidate_extension_exercised: CE-J1  # PROTEIN_SUBDOMAIN would be preferred
    candidate_extension_note: >
      Paper resolves the interaction to the WD14 domain of LLGL1 —
      finer than GENE but no enumeration value exists. Using GENE with
      candidate-extension flag.
    phenotype_scale: MOLECULAR
    measurement_target: [BINDING]
    normalization_note:
      original_annotator_value: "Binding activity"
      normalized_to: "BINDING"
      type: ai_normalization
    gene_relation: null
    candidate_extension_for_gene_relation: CE-J3  # would be X_physically_binds_Y
    reviewer_query:
      issue: >
        Gene relation LLGL1<->N-cadherin is physical binding, which
        doesn't fit any current enumerated value. Left null pending
        candidate extension CE-J3 promotion.
    credibility: VERY_HIGH
    assertions:
      - id: GE-4.A1
        statement: "LLGL1 and N-cadherin form a complex in mouse brain"
        source_span:
          page: 10
          key_phrase: "co-immunoprecipitation... endogenous LLGL1 and N-cadherin in E14.5 brains"
        callout: {page: 10, text: "Molecular function of a protein"}
      - id: GE-4.A2
        statement: "LLGL1 preferentially binds N-cadherin over beta-catenin"
        source_span:
          page: 10
          key_phrase: "LLGL1 preferentially bound to N-cadherin"
        callout: null
      - id: GE-4.A3
        statement: "The C-terminal WD14 (and partially WD10) domain of LLGL1 mediates N-cadherin binding"
        source_span:
          page: 10
          key_phrase: "C-terminal WD14 domain of LLGL1... responsible for interaction with N-cadherin"
        callout: {page: 10, text: "mapping part of protein involved in interaction with cadherin"}
      - id: GE-4.A4
        statement: "N-cadherin, LLGL1, and beta-catenin form a tripartite complex"
        source_span:
          page: 10
          key_phrase: "LLGL1, N-cadherin, and beta-catenin form tripartite complex"
        callout: null

  # --------------------------------------------------------------------
  - id: GE-5
    label: "Regulatory mechanism — aPKC phosphorylation inhibits LLGL1-N-cadherin binding"
    source: manual_annotation
    knowledge_domain: [GENE_FUNCTION]
    method: [IN_VITRO_EXPERIMENT]
    target_type: GENE
    target: "LLGL1 (aPKC phosphorylation sites)"
    resolution: POSITION  # the 5 serine sites
    phenotype_scale: MOLECULAR
    measurement_target: [BINDING, ACTIVITY]
    gene_relation: X_inhibits_Y
    gene_relation_detail: "aPKC inhibits LLGL1-N-cadherin interaction via phosphorylation of 5 conserved serines"
    credibility: VERY_HIGH
    assertions:
      - id: GE-5.A1
        statement: >
          Constitutively active aPKC decreases wild-type LLGL1 binding
          to N-cadherin, but not 5SA-mutant (unphosphorylatable) LLGL1
        source_span:
          page: 10
          key_phrase: "Co-expression of constitutively active aPKC decreased the binding between wild-type LLGL1 and N-cadherin"
        callout: {page: 10, text: "Regulation via phosporilation"}

  # --------------------------------------------------------------------
  - id: GE-6
    label: "In vivo dominant-negative — disruption of LLGL1-N-cadherin interaction is sufficient for PH"
    source: manual_annotation
    knowledge_domain: [MODEL_ORGANISM, GENE_FUNCTION]
    method: [IN_VIVO_EXPERIMENT]
    method_detail: >
      In utero electroporation at E15.5 of wild-type rat cortices with
      3xLLGL1#9-GFP (dominant-negative) or CA-aPKC+Par3 (mimics
      phospho-LLGL1); rescue by 5SA-LLGL1.
    target_type: GENE
    target: "LLGL1-N-cadherin interaction"
    candidate_extension_exercised: CE-J2  # would be INTERACTION or COMPLEX
    candidate_extension_note: >
      This evidence is about a protein-protein interaction, not a
      gene. Current enumeration has no matching value. Using GENE
      with candidate-extension flag.
    resolution: GENE
    organism: "Rat (embryonic cortex)"
    reviewer_query:
      issue: >
        Annotator summary gave Organism = "Mammal (mouse)" for the
        paper. This specific experiment uses rat, not mouse. Flagging
        for curator review. Multiple organisms appear in the paper's
        experimental program.
    phenotype_scale: ORGANISMAL
    measurement_target: [LOCALIZATION, EXISTENCE]
    credibility: VERY_HIGH
    assertions:
      - id: GE-6.A1
        statement: "Disruption of LLGL1-N-cadherin interaction causes neuronal heterotopia in vivo"
        source_span:
          page: 12
          key_phrase: "rescued by... full-length, but not C-terminally truncated, unable to bind to N-cadherin human LLGL1"
        callout: null
      - id: GE-6.A2
        statement: "Aberrant (constitutive) aPKC activity mimics the shLlgl1 heterotopia phenotype"
        source_span:
          page: 12
          key_phrase: "activation and plasma membrane targeting of aPKC can mimic the shLlgl1 phenotype"
        callout: {page: 12, text: "aberrant phosphorylation cause phenotype"}

