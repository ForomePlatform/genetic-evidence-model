  - dimension: severity_of_phenotype
    rationale_inferred: "Sub-dimension of accuracy_of_mapping; cascades from parent omission"
  - dimension: indirection
    rationale_inferred: "Sub-dimension of accuracy_of_mapping; cascades from parent omission"
  - dimension: hpo_terms
    rationale_inferred: "Not populated; see reviewer_suggestion under GE-1"
  - dimension: mode_of_inheritance
    rationale_inferred: "Conditional dim: activates only for Human Genetics + Gene"
  - dimension: mendelian_segregation
    rationale_inferred: "Conditional dim: activates only for Human Genetics + Gene"
  - dimension: exact_variant
    rationale_inferred: "Conditional dim: activates only for Human Genetics"

