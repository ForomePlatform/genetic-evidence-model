recommendations:
  second_round_warranted: true
  rationale: >
    Two REVIEW_PROTOCOL §7 triggers fire: an item was added during the Phase-1
    missing-evidence check (GE-new-1), and multiple items were marked for edit
    (GE-1, GE-2, GE-3, GE-4). The third trigger (cross-cutting method-hierarchy
    rework) does NOT fire — it was dissolved by the v0 reframing (O4). A second
    round should re-scrutinise the four edited items and the newly added item
    under the same workflow.
  out_of_scope_followups:
    - "Apply the six leaf-value method migrations (separate edit workflow; ROADMAP §1.b)."
    - "Curator/schema action on CE-DU3 and CE-DU4 (the review records candidates; it does not change the schema)."
    - "Doc note tightening the dimensions.md HUMAN_GENETICS gloss per SR-1."
