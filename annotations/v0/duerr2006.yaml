#    GE-2: rs11209026 protective in Jewish ileal CD replication cohort
#    GE-3: Family-based transmission disequilibrium (TDT via FBAT)
#    GE-4: Multiple independent IL23R signals (conditional/fine-mapping)
#    GE-5: Negative association at IL12RB1/IL23A/IL12B (pathway genes)
#    GE-6: Cited mouse-model and functional support (external)
#    GE-new-1: Cited anti-p40 (IL12B) antibody trial (external, clinical)
# =====================================================================

evidence:

  # --------------------------------------------------------------------
  - id: GE-1
    label: "rs11209026 (Arg381Gln) in IL23R confers protection against ileal CD in non-Jewish discovery cohort"
    source: ai_drafted
    knowledge_domain: [POPULATION_GENETICS]
    method: [GWAS]
    target_type: VARIANT
    target: "rs11209026 (c.1142G>A, p.Arg381Gln) in IL23R"
    resolution: VARIANT
    variant_ascertainment: [OBSERVED_IN_CASES, OBSERVED_IN_CONTROLS]
    phenotype_scale: CLINICAL
    mode_of_inheritance:
      annotated_as: not_applicable_or_omitted
      rule_outcome: >
        The conditional activates for HUMAN_GENETICS + GENE; it is not
        triggered here (target_type is VARIANT, knowledge_domain is
        POPULATION_GENETICS). Dimension correctly inactive — recorded as a
        rule outcome, not an annotator assumption.
    credibility: HIGH
    credibility_comment: >
      Genome-wide significance after Bonferroni correction
      (corrected P = 1.56e-3). Effect size is large (OR = 0.26).
      Confidence interval is wide (0.15-0.43) because the allele is
      uncommon in cases (MAF 1.9%). Independent replication follows in
      GE-2.
    special_considerations:
      - key: "cohort_size_initial"
        value: "567 non-Jewish European-ancestry cases with ileal CD; 571 non-Jewish controls"
      - key: "cohort_size_post_QC"
        value: "547 cases, 548 controls after genotype-completion filter"
      - key: "platform"
        value: "Illumina HumanHap300 BeadChip (308,332 autosomal SNPs)"
      - key: "multiple_testing"
        value: "Bonferroni correction across all 308,332 tested SNPs"
      - key: "ancestry_restriction"
        value: "European ancestry, non-Jewish; chosen to minimise population stratification"
    candidate_extension_exercised: CE-DU1  # direction of effect
    assertions:
      - id: GE-1.A1
        statement: "rs11209026 (Arg381Gln) is genome-wide significantly associated with ileal Crohn's disease"
        source_span:
          page: 1
          key_phrase: "rs11209026 (P = 5.05 x 10-9, corrected P = 1.56 x 10-3)"
        callout: null
      - id: GE-1.A2
        statement: "The Gln allele is protective (OR = 0.26, 95% CI 0.15-0.43)"
        source_span:
          page: 2
          key_phrase: "glutamine allele appears to protect against development of CD"
        callout: null
        note: >
          Candidate extension CE-DU1 (direction of effect) is
          exercised here. Numerically encoded via OR<1.
      - id: GE-1.A3
        statement: "The Gln allele has MAF 1.9% in ileal CD cases vs 7.0% in controls"
        source_span:
          page: 2
          key_phrase: "allelic frequency of 1.9% in the non-Jewish patients with ileal CD and 7.0% in non-Jewish controls"
        callout: null

  # --------------------------------------------------------------------
  - id: GE-2
    label: "rs11209026 (Arg381Gln) confers protection against ileal CD in Jewish replication cohort"
    source: ai_drafted
    knowledge_domain: [POPULATION_GENETICS]
    method: [ASSOCIATION_STUDY]
    target_type: VARIANT
    target: "rs11209026"
    resolution: VARIANT
    variant_ascertainment: [OBSERVED_IN_CASES, OBSERVED_IN_CONTROLS]
    phenotype_scale: CLINICAL
    credibility: HIGH
    credibility_comment: >
      Independent cohort, independent ancestry group, consistent
      direction of effect. Targeted replication of IL23R markers (not a
