      P = 3.55e-11.
    special_considerations:
      - key: "cohort"
        value: "401 Jewish-ancestry ileal CD cases; 433 Jewish-ancestry controls"
      - key: "rationale_for_ancestry_stratification"
        value: >
          Known higher baseline IBD prevalence in Ashkenazi Jewish
          populations motivates a separate replication cohort rather
          than merging.
    assertions:
      - id: GE-2.A1
        statement: "rs11209026 association replicates in the Jewish cohort (P = 7.95e-4)"
        source_span:
          page: 2
          key_phrase: "replication in the Jewish cohort (P = 7.95 x 10-4)"
          source_span_is_paraphrase: true
        callout: null
        ai_assumption:
