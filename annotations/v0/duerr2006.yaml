  - id: GE-3
    label: "Family-based transmission disequilibrium — Gln undertransmitted to affected offspring"
    source: ai_drafted
    knowledge_domain: [HUMAN_GENETICS]
    method: [TRANSMISSION_DISEQUILIBRIUM_TEST]
    target_type: VARIANT
    target: "rs11209026"
    resolution: VARIANT
    variant_ascertainment: [OBSERVED_IN_CASES]
    phenotype_scale: CLINICAL
    mode_of_inheritance: COMPLEX
    mendelian_segregation: false
    exact_variant: true
    ai_assumption:
      field: mode_of_inheritance
      value_used: COMPLEX
      rationale: >
        The paper does not model Mendelian inheritance but uses
        transmission disequilibrium to test association. The existing
        enumeration has no COMPLEX / non-Mendelian value; COMPLEX is used
        as a placeholder. See CE-DU4 (this conditional set is relevant for
        HUMAN_GENETICS + VARIANT, and the enumeration lacks a COMPLEX
        value). mode_of_inheritance is KEPT per curator (MOI is relevant
        for a within-family transmission test), even though the schema
        does not currently activate the conditional set for a VARIANT
        target.
      ai_uncertainty: true
    credibility: HIGH
    credibility_comment: >
      Family-based design controls for population stratification, a
      complementary source of evidence to the case-control analyses in
      GE-1/GE-2. 883 nuclear families, 1119 affected offspring. Combined
      case-control + family-based P = 6.62e-19 for IBD phenotype.
    special_considerations:
      - key: "software"
        value: "FBAT with empirical variance estimator"
      - key: "family_structure"
        value: >
          883 families (518 non-Jewish CD, 215 non-Jewish UC, 77 Jewish
          CD, 80 Jewish UC); 1119 affected offspring total
      - key: "striking_null_result"
        value: >
