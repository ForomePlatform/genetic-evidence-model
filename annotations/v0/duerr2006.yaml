        statement: "Gln allele is significantly undertransmitted from heterozygous parents to IBD-affected offspring"
        source_span:
          page: 2
          key_phrase: "transmitted:non-transmitted = 45:130, P = 1.32e-10 for the IBD phenotype in all 883 families"
        callout: null
      # REVIEW 2026-06-04: the former compound A2 (four per-phenotype clauses
