    candidate_extension_exercised: CE-DU3
    assertions:
      - id: GE-new-1.A1
        statement: "An anti-p40 monoclonal antibody reduced Crohn's disease activity in a clinical trial"
        source_span:
          page: 3
          key_phrase: "anti-p40 (IL-12/IL-23) monoclonal antibody in a Crohn's disease trial (ref 25)"
          source_span_is_paraphrase: true
        callout: null
