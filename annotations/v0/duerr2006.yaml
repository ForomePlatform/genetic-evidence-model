# =====================================================================
#  Candidate extensions surfaced by this paper
# =====================================================================
candidate_extensions:
  - id: CE-DU1
    dimension: direction_of_effect
    description: >
      The paper reports a *protective* allele (Gln at rs11209026,
      OR=0.26 in non-Jewish cases, OR=0.45 in Jewish cases). Current
      model stores this via the numeric OR value in the assertion, but
      there is no first-class Direction dimension distinguishing
      "risk-conferring" from "protective." ACMG-AMP explicitly
      separates BP (benign supporting) from PM (pathogenic moderate)
      evidence, so this distinction matters for downstream clinical
      reasoning. Candidate: a Direction dimension with values
      RISK_CONFERRING / PROTECTIVE / NEUTRAL / UNKNOWN, OR keep it
      implicit via OR<1 vs OR>1. The annotation preserves the OR
      numerically; flagging only the dimension question.
    location_in_this_annotation: "GE-1 (primary discovery)"

  - id: CE-DU3
    dimension: cross_item_synthesis / translational_scope
    description: >
      The paper makes a higher-order, cross-item synthesizing claim —
      that blockade of the IL-23 signaling pathway would be a rational
      therapeutic strategy for IBD (p.3) — that references multiple GE
      items jointly. The schema has no slot for such a meta-assertion.
      Two framings: (a) add a construct for higher-order claims that
      reference multiple GeneticEvidence items; (b) treat translational
      / therapeutic recommendations as out of GEM scope. Per PROTOCOL
      §3.3 / §5 the gap is logged locally on first sight; the two-papers
      rule governs promotion only. Replaces the previously invented
      `meta_assertions` top-level key (former MA-1).
    location_in_this_annotation: "former MA-1 (retired) and GE-new-1"
    instances:
      - source: "former MA-1 (therapeutic-strategy statement)"
        source_span:
          page: 3
          key_phrase: "blockade of the IL-23 signaling pathway would be a rational therapeutic strategy"
      - source: "GE-new-1 (cited anti-p40 antibody trial, ref 25)"

  - id: CE-DU4
    dimension: conditional_activation
    affected_dimensions: [mode_of_inheritance, mendelian_segregation, exact_variant, subdomain]
    description: >
      The conditional set {mode_of_inheritance, mendelian_segregation,
      exact_variant, subdomain} currently activates only for
      HUMAN_GENETICS + GENE, but is equally relevant for HUMAN_GENETICS
      + VARIANT — as in GE-3, a family-based transmission test on a
      specific variant where mode_of_inheritance is genuinely relevant
      yet the schema does not activate it. Proposed fix: extend
      activation to HUMAN_GENETICS + (GENE or VARIANT). Two sub-gaps:
      (a) mode_of_inheritance has no COMPLEX / non-Mendelian value
      (GE-3 used COMPLEX as a placeholder); (b) subdomain has no
      family-based value (so the GWAS value previously forced onto
      GE-3's transmission test was simply wrong).
    location_in_this_annotation: "GE-3"

# =====================================================================
