    label: "Anti-p40 (IL12B) monoclonal antibody reduces disease activity in a Crohn's disease trial (cited, ref 25)"
    source: ai_drafted
    added_in_review: "2026-06-04 (Phase 1)"
    cited_evidence: true
    knowledge_domain:
