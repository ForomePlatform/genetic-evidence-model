        (GENE_FUNCTION unjustified; IN_VITRO unsupported; evidence_origin
        should be cited_evidence: true; role-description label; loose
        target) were accepted as-is (approved_despite_flags), not applied.
    special_considerations:
      - key: "evidence_status"
        value: >
          Prior literature cited in the Discussion, not generated by
          this paper's original data. Credibility inherited from the
          cited works.
    assertions:
      - id: GE-6.A1
        statement: >
          IL-23 is required for murine colitis, experimental autoimmune
          encephalomyelitis, and collagen-induced arthritis
        source_span:
          page: 3
          key_phrase: "requirement for IL-23 in murine colitis, experimental autoimmune encephalitis, and collagen-induced arthritis"
        callout: null
      - id: GE-6.A2
        statement: >
          Transgenic IL-23 p19 overexpression causes severe systemic
          inflammation including small and large intestine
        source_span:
          page: 3
          key_phrase: "transgenic expression of IL-23 subunit p19 results in severe systemic inflammation"
        callout: null

