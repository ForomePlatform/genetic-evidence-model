  - id: GE-6
    label: "Cited mouse-model and functional support for IL-23 in colitis"
    source: ai_drafted
    knowledge_domain: [MODEL_ORGANISM, GENE_FUNCTION]
    method: [IN_VIVO, IN_VITRO]
    target_type: GENE
    target: "IL-23 pathway"
    resolution: GENE
    organism: "Mouse (various colitis, EAE, and arthritis models)"
    phenotype_scale: ORGANISMAL
    evidence_origin: cited_prior_literature
    credibility: HIGH
    ai_uncertainty:
      issue: >
        This GE item is NOT generated by the Duerr paper. It is a set
        of citations to prior mouse-model work (refs 13-15, 18) that
        the Discussion leverages to motivate IL23R as a therapeutic
        target. There is no model-provided dimension distinguishing
        "evidence produced by this paper" from "evidence cited by this
        paper." Resolved in the KEEP direction per PROTOCOL §7 (cited
