    method: [CLINICAL_EVIDENCE]
    target_type: GENE
    target: "IL12B (p40 subunit)"
    resolution: GENE
    phenotype_scale: CLINICAL
    credibility: HIGH
    credibility_comment: >
      Cited clinical-trial evidence (ref 25); credibility inherited from
