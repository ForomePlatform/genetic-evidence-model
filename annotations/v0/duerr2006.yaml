      # paraphrase anchors pending PDF verification.
      - id: GE-3.A2
        statement: "Gln allele is undertransmitted in non-Jewish CD families"
        source_span:
          page: 2
          key_phrase: "non-Jewish CD families, per-phenotype transmission (Table 2)"
          source_span_is_paraphrase: true
        callout: null
        ai_uncertainty:
          note: "Per-phenotype span (Table 2, p.2) needs verbatim confirmation against the PDF."
      - id: GE-3.A3
        statement: "Gln allele is undertransmitted in non-Jewish UC families"
        source_span:
          page: 2
          key_phrase: "non-Jewish UC families, per-phenotype transmission (Table 2)"
          source_span_is_paraphrase: true
        callout: null
        ai_uncertainty:
          note: "Per-phenotype span (Table 2, p.2) needs verbatim confirmation against the PDF."
      - id: GE-3.A4
        statement: "Gln allele is undertransmitted in Jewish CD families"
        source_span:
          page: 2
          key_phrase: "Jewish CD families, per-phenotype transmission (Table 2)"
          source_span_is_paraphrase: true
        callout: null
        ai_uncertainty:
          note: "Per-phenotype span (Table 2, p.2) needs verbatim confirmation against the PDF."
      - id: GE-3.A5
        statement: "No association of Arg381Gln in Jewish UC families"
        source_span:
          page: 2
          key_phrase: "no evidence for association of Arg381Gln or other IL23R region markers in the Jewish UC families"
        callout: null
        note: >
          Phenotype-stratified negative result within a replication —
          itself informative. Handled as an ordinary predicate of absence
          (no polarity dimension required; cf. withdrawn CE-DU2).

  # --------------------------------------------------------------------
  - id: GE-4
    label: "Multiple independent IL23R variants contribute to CD risk by conditional analysis"
    source: ai_drafted
    knowledge_domain: [POPULATION_GENETICS]
    method: [FINE_MAPPING]
    target_type: VARIANT
    target: "rs7517847 (intronic, r^2 = 0.03 with rs11209026)"
    resolution: VARIANT
    variant_ascertainment: [OBSERVED_IN_CASES, OBSERVED_IN_CONTROLS]
    phenotype_scale: CLINICAL
    credibility: HIGH
    credibility_comment: >
      Conditional analysis is a standard method for disentangling
      LD-correlated signals. rs7517847 has the most significant
      combined P (3.36e-13) and is not in LD with the coding variant,
      supporting at least two independent IL23R association signals.
      The paper speculates that differential splicing (IL23R has six
      known alternative splice variants) could underlie the multiple
      signals, but the mechanism remains speculative in this paper.
    special_considerations:
      - key: "approach"
        value: "Conditional association testing stratified on rs11209026 genotypes"
      - key: "LD_context"
        value: >
          rs11465804 has r^2 = 0.84 with rs11209026 (not independent);
          rs7517847 has r^2 = 0.03 (independent)
    assertions:
      - id: GE-4.A1
        statement: >
          Multiple residual association signals across IL23R indicate
          multiple independent risk variants in the region; rs7517847 is
          not in LD with rs11209026 (r^2 = 0.03) and carries the strongest
          combined signal (P = 3.36e-13)
        source_span:
          page: 3
          key_phrase: "multiple residual association signals throughout IL23R, indicating that there are multiple risk variants in the region"
        callout: null
        note: >
          REVIEW 2026-06-04: restated from the prior claim that "rs7517847
          remains significantly associated after conditioning on rs11209026",
          which is a per-marker conditional result in table S3 (supplementary,
          not in the provided PDF). This statement is restricted to what the
          main text supports (independence-by-LD, strongest combined signal,
          aggregate multiplicity).

