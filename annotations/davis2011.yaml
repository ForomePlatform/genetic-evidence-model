reviewer_flag_summary:
  queries: 2           # measurement_target STABILITY inclusion; specificity_of_phenotype=SNV
  suggestions: 1       # HPO term candidates for GE-5
  disagreements: 1     # organism set (rat omitted from summary table)
  curator_critiques: 1 # GE-1.A3 statistical concern (from annotator callout)
  model_extensions_proposed: 3
    # ME-D1: knowledge_domain priority ranking
    # ME-D2: variant_ascertainment dimension
    # ME-D3: curator_critique-on-assertion field
